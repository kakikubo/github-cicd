# Usage: gh workflow run publish.yml -f version=0.1.0
name: Publish
on:
  workflow_dispatch:
    inputs:
      version:                             # ワークフロー起動時に指定するバージョン
        type: string
        required: true
        description: "バージョン(例: 1.2.3)"
env:
  IMAGE_NAME: gha-image                    # コンテナイメージ名
permissions: {}
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:                           # Github Packagesへの書き込みを許可
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4       # コンテナレジストリへのログイン
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6    # コンテナイメージのメタデータ生成
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=v${{ inputs.version }}
            type=raw,value=latest
      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7  # コンテナイメージのビルドとプッシュ
        with:
          push: true
          context: docker/example/
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
