name: Dump
on: workflow_dispatch
permissions: {}
jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7     # ローカルアクション呼び出し前にチェックアウト
      - uses: ./.github/actions/dump/ # ローカルアクションの呼び出し
        id: dump
        with:
          enable-context: 'true'      # 入力パラメータの指定
      - run: echo "${DATE}"
        env:
          DATE: ${{ steps.dump.outputs.dumped-date }} # アクションの出力値を参照
